services:
  - type: web
    name: social-automation-v2
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run migrate
    startCommand: npm run start
    healthCheckPath: /api/system/health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BLOTATO_API_KEY
        sync: false
      - key: BLOTATO_API_URL
        value: https://api.blotato.com
      - key: BLOTATO_WEBHOOK_SECRET
        generateValue: true
      - key: SHOW_LOGIN_HINT
        value: "false"
      # Meta Graph API — Insights Instagram/Facebook automatiche (OAuth).
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      # Cloudflare R2 — storage immagini PERSISTENTE (senza, upload effimeri).
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
