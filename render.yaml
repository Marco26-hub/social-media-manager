services:
  - type: web
    name: social-automation-v2
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run migrate
    startCommand: npm run start
    healthCheckPath: /api/system/health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BLOTATO_API_KEY
        sync: false
      - key: BLOTATO_API_URL
        value: https://api.blotato.com
      - key: BLOTATO_WEBHOOK_SECRET
        generateValue: true
      - key: SHOW_LOGIN_HINT
        value: "false"
      # Pubblicazione social REALE (disaccoppiata dal demo mode). Default OFF:
      # l'app gira reale (registrazione/login/dati veri) ma NON pubblica sui
      # social finché non metti PUBLISH_ENABLED=true. Demo mode non pubblica mai.
      - key: PUBLISH_ENABLED
        value: "false"
      # Admin reale: impostale per creare l'admin di produzione e DISABILITARE
      # il default 'admin'/'1234567' allo start (scripts/ensure-admin.mjs).
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Meta Graph API — Insights Instagram/Facebook automatiche (OAuth).
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      # Storage immagini PERSISTENTE, qualsiasi provider S3-compatible (Cloudflare R2,
      # Backblaze B2, ecc. — senza, upload effimeri, spariscono ad ogni deploy).
      # STORAGE_PUBLIC_URL opzionale: se assente → bucket privato servito via proxy app
      # (usalo con Backblaze B2 privato, che non richiede carta di credito).
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        sync: false
      - key: STORAGE_PUBLIC_URL
        sync: false
